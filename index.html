<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis CRE | Pre-Stress Lead Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Space Grotesk', Arial, sans-serif;
    background: #0D0D0D;
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.4;
  }

  /* ── Header ── */
  .header {
    padding: 40px 48px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-weight: 900;
    font-size: 42px;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header h1 span { color: #ADFF2F; }
  .header .subtitle {
    color: #888888;
    font-size: 14px;
    margin-top: 6px;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #ADFF2F;
    padding: 6px 14px;
    background: #1A3320;
    border-radius: 20px;
  }

  /* ── Stat Cards ── */
  .stats-row {
    display: flex;
    gap: 16px;
    padding: 16px 48px 8px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: #1A1A1A;
    border-radius: 12px;
    padding: 20px 28px;
    flex: 1;
    min-width: 140px;
  }
  .stat-card .label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888888;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 36px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1;
  }
  .stat-card .value.accent { color: #ADFF2F; }
  .stat-card.hot { border-left: 3px solid #ff4444; }
  .stat-card.warm { border-left: 3px solid #ff8800; }
  .stat-card.watch { border-left: 3px solid #ADFF2F; }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 12px;
    padding: 20px 48px 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888888;
    display: block;
    margin-bottom: 4px;
  }
  .filter-group select, .filter-group input {
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    color: #FFFFFF;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    min-width: 160px;
    outline: none;
  }
  .filter-group select:focus, .filter-group input:focus {
    border-color: #ADFF2F;
  }
  .tier-pills {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    padding-top: 16px;
  }
  .tier-pill {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #2A2A2A;
    background: #1A1A1A;
    color: #888888;
    transition: all 0.15s;
  }
  .tier-pill:hover { border-color: #ADFF2F; color: #FFFFFF; }
  .tier-pill.active { background: #ADFF2F; color: #0D0D0D; border-color: #ADFF2F; }
  .tier-pill.active-hot { background: #ff4444; color: #FFFFFF; border-color: #ff4444; }
  .tier-pill.active-warm { background: #ff8800; color: #0D0D0D; border-color: #ff8800; }
  .tier-pill.active-watch { background: #ADFF2F; color: #0D0D0D; border-color: #ADFF2F; }

  /* ── Table ── */
  .table-wrap {
    padding: 16px 48px 48px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: #1A1A1A;
    padding: 12px 14px;
    text-align: left;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888888;
    border-bottom: 1px solid #2A2A2A;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #ADFF2F; }
  thead th .sort-arrow { margin-left: 4px; font-size: 9px; }
  tbody tr {
    border-bottom: 1px solid #1A1A1A;
    transition: background 0.1s;
  }
  tbody tr:nth-child(odd) { background: #111111; }
  tbody tr:nth-child(even) { background: #0D0D0D; }
  tbody tr:hover { background: #1A3320; }
  td {
    padding: 11px 14px;
    white-space: nowrap;
  }

  /* ── Tier Badges ── */
  .tier-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tier-HOT { background: #ff4444; color: #fff; }
  .tier-WARM { background: #ff8800; color: #0D0D0D; }
  .tier-WATCH { background: #ADFF2F; color: #0D0D0D; }
  .tier-PASS { background: #2A2A2A; color: #888888; }

  /* ── Score Bar ── */
  .score-bar {
    width: 60px;
    height: 6px;
    background: #2A2A2A;
    border-radius: 3px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* ── Signal Tags ── */
  .signal-tag {
    display: inline-block;
    background: #2A2A2A;
    color: #ADFF2F;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    margin: 1px 3px 1px 0;
    white-space: nowrap;
  }
  .signal-tag.distress { background: #3a1111; color: #ff6666; }

  /* ── Property Link ── */
  .prop-link {
    color: #FFFFFF;
    text-decoration: none;
    border-bottom: 1px dotted #555;
    transition: color 0.15s, border-color 0.15s;
  }
  .prop-link:hover { color: #ADFF2F; border-color: #ADFF2F; }

  /* ── Executive Summary Cell ── */
  .exec-summary {
    max-width: 260px;
    white-space: normal;
    line-height: 1.35;
    font-size: 11px;
    color: #aaa;
    cursor: default;
  }
  .exec-summary-short {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .exec-summary.expanded .exec-summary-short {
    -webkit-line-clamp: unset;
  }
  .exec-toggle {
    color: #ADFF2F;
    font-size: 10px;
    cursor: pointer;
    margin-top: 2px;
    display: inline-block;
  }
  .exec-toggle:hover { text-decoration: underline; }

  /* ── Map Section ── */
  .map-section {
    padding: 8px 48px 16px;
  }
  .map-section h2 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .map-section h2 span { color: #ADFF2F; }
  .state-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .state-card {
    background: #1A1A1A;
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .state-card:hover { border-color: #ADFF2F; }
  .state-card.selected { border-color: #ADFF2F; background: #1A3320; }
  .state-card .state-name {
    font-weight: 800;
    font-size: 18px;
    margin-bottom: 4px;
  }
  .state-card .state-count {
    color: #888888;
    font-size: 12px;
  }
  .state-card .state-count strong { color: #ADFF2F; font-weight: 700; }
  .state-mini-bars {
    display: flex;
    gap: 3px;
    margin-top: 10px;
    height: 4px;
  }
  .state-mini-bars div { border-radius: 2px; height: 100%; }

  /* ── Footer ── */
  .footer {
    padding: 20px 48px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #888888;
  }
  .footer .brand { color: #ADFF2F; font-weight: 500; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header, .stats-row, .filters, .table-wrap, .map-section, .footer { padding-left: 20px; padding-right: 20px; }
    .header h1 { font-size: 28px; }
    .stat-card .value { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Pre-Stress <span>Lead Dashboard</span></h1>
    <div class="subtitle">CMBS Distressed Deal Pipeline &mdash; Southeast US Multifamily</div>
  </div>
  <div class="brand-tag">Oasis CRE Advisors</div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="map-section">
  <h2>Leads by <span>State</span></h2>
  <div class="state-grid" id="stateGrid"></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>State</label>
    <select id="filterState"><option value="">All States</option></select>
  </div>
  <div class="filter-group">
    <label>City</label>
    <select id="filterCity"><option value="">All Cities</option></select>
  </div>
  <div class="filter-group">
    <label>Source</label>
    <select id="filterSource"><option value="">All Sources</option></select>
  </div>
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="filterSearch" placeholder="Property name...">
  </div>
  <div class="tier-pills" id="tierPills"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-sort="name">Property <span class="sort-arrow"></span></th>
        <th data-sort="city">City <span class="sort-arrow"></span></th>
        <th data-sort="state">State <span class="sort-arrow"></span></th>
        <th data-sort="source">Source <span class="sort-arrow"></span></th>
        <th data-sort="units">Units <span class="sort-arrow"></span></th>
        <th data-sort="score">Score <span class="sort-arrow"></span></th>
        <th data-sort="tier">Tier <span class="sort-arrow"></span></th>
        <th data-sort="dscr">DSCR <span class="sort-arrow"></span></th>
        <th data-sort="occupancy">Occ % <span class="sort-arrow"></span></th>
        <th data-sort="balance">Balance <span class="sort-arrow"></span></th>
        <th data-sort="maturity">Maturity <span class="sort-arrow"></span></th>
        <th data-sort="lender">Lender <span class="sort-arrow"></span></th>
        <th data-sort="servicer">Servicer <span class="sort-arrow"></span></th>
        <th>Signals</th>
        <th>Executive Summary</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="footer">
  <span>Page 1</span>
  <span class="brand">Oasis CRE Advisors</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ── GOOGLE SHEETS CONFIG ──
// After you Publish to Web (see instructions), paste your CSV link here:
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRRUs1ua1i9_IvnJQ_lWet1puckH_Gaf49gW3J1kHuUs-9xcP4tuzojtS9pUxdgPSOr9T88A9SLpdmT/pub?gid=0&single=true&output=csv';

function firstValue(row, keys) {
  for (const key of keys) {
    if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') {
      return row[key];
    }
  }
  return null;
}

function parseNum(value) {
  if (value === null || value === undefined || value === '') return null;
  const cleaned = String(value).replace(/[%,$]/g, '').trim();
  const n = parseFloat(cleaned);
  return Number.isFinite(n) ? n : null;
}

function parseIntSafe(value) {
  if (value === null || value === undefined || value === '') return null;
  const n = parseInt(String(value).trim(), 10);
  return Number.isFinite(n) ? n : null;
}

// Supports BOTH normalized schema and legacy sheet headers
function parseSheetRow(row) {
  const out = {
    name: firstValue(row, ['property_name', 'Property Name', 'name']),
    city: firstValue(row, ['city', 'City']),
    state: firstValue(row, ['state', 'State']),
    source: firstValue(row, ['source', 'Data Source', 'Source']),
    units: firstValue(row, ['units', 'Units']),
    dscr: firstValue(row, ['dscr', 'DSCR']),
    occupancy: firstValue(row, ['occupancy', 'Occupancy']),
    balance: firstValue(row, ['loan_balance', 'Loan Balance', 'balance']),
    maturity: firstValue(row, ['maturity_date', 'Maturity Date', 'maturity']),
    lender: firstValue(row, ['lender', 'Lender']),
    servicer: firstValue(row, ['servicer', 'Servicer']),
    executiveSummary: firstValue(row, ['executiveSummary', 'Executive Summary', 'executive_summary']),
    acquisitionAngle: firstValue(row, ['acquisitionAngle', 'Acquisition Angle', 'acquisition_angle']),
    distressSignals: firstValue(row, ['distressSignals', 'Distress Signals', 'distress_signals', 'signals']),
    priorityTier: firstValue(row, ['priorityTier', 'Priority Tier', 'priority_tier', 'tier']),
    adjustedScore: firstValue(row, ['adjustedScore', 'Adjusted Score', 'adjusted_score', 'score']),
    baseDistressScore: firstValue(row, ['baseDistressScore', 'Base Distress Score', 'base_distress_score']),
    scoreAdjustment: firstValue(row, ['scoreAdjustment', 'Score Adjustment', 'score_adjustment']),
    dataQualityFlag: firstValue(row, ['dataQualityFlag', 'Data Quality Flag', 'data_quality_flag']),
    status: firstValue(row, ['status', 'Status']),
    lastUpdated: firstValue(row, ['lastUpdated', 'Last Updated', 'last_updated']),
    address: firstValue(row, ['address', 'Property Address', 'Address']),
    county: firstValue(row, ['county', 'County']),
    borrower: firstValue(row, ['borrower', 'Borrower Entity', 'Borrower']),
    rateType: firstValue(row, ['rate_type', 'rateType', 'Rate Type']),
    cmbsTrust: firstValue(row, ['cmbsTrust', 'CMBS Trust']),
    reportPeriod: firstValue(row, ['report_period', 'Report Period']),
    loanNumber: firstValue(row, ['loan_number', 'Loan Number']),
    transactionId: firstValue(row, ['transaction_id', 'Transaction ID']),
  };

  out.dscr = parseNum(out.dscr);
  out.occupancy = parseNum(out.occupancy);
  out.balance = parseNum(out.balance) || 0;
  out.adjustedScore = parseIntSafe(out.adjustedScore) || 0;
  out.baseDistressScore = parseIntSafe(out.baseDistressScore);
  out.scoreAdjustment = parseIntSafe(out.scoreAdjustment) || 0;
  out.units = out.units || '';
  out.priorityTier = out.priorityTier || 'PASS (no data)';
  out.distressSignals = out.distressSignals || '';
  out.executiveSummary = out.executiveSummary || '';
  out.lender = out.lender || '';
  out.servicer = out.servicer || '';
  out.source = out.source || 'Unknown';
  out.city = out.city || '';
  out.state = out.state || '';
  out.name = out.name || '';
  return out;
}

// ── DATA VARIABLE (set by live fetch or fallback) ──
let LEADS = [];

// ── FALLBACK DATA (legacy snapshot retained; normalized on load) ──
const FALLBACK_LEADS = [{"name": "The Hill", "city": "Columbus", "state": "GA", "units": "258", "dscr": null, "occupancy": 58.14, "paymentStatus": 2, "balance": 4100000.0, "maturity": "01-06-2029", "score": 100, "tier": "HOT", "signals": "Payment Status: 2; Special Servicer; Workout; Low Occupancy", "lender": "Argentic Real Estate Finance 2 LLC", "servicer": "Berkadia", "specialServicer": true, "workout": true}, {"name": "Residence at Patriot Place", "city": "Columbus", "state": "GA", "units": "257", "dscr": null, "occupancy": null, "paymentStatus": 3, "balance": 33000000.0, "maturity": "12-06-2028", "score": 100, "tier": "HOT", "signals": "Payment Status: 3; Special Servicer; Workout", "lender": "UBS AG", "servicer": "Midland Loan Services", "specialServicer": true, "workout": true}, {"name": "THE WYMORE 360", "city": "Altamonte Springs", "state": "FL", "units": "200", "dscr": 0.4983, "occupancy": 81.0, "paymentStatus": 0, "balance": 33000000.0, "maturity": "11-06-2029", "score": 40, "tier": "WATCH", "signals": "Low DSCR", "lender": "DBR Investments Co. Limited", "servicer": "Wells Fargo Bank, NA", "specialServicer": false, "workout": false}];

function normalizeFallbackLead(l) {
  return {
    name: l.name || '',
    city: l.city || '',
    state: l.state || '',
    source: l.source || 'CMBS',
    units: l.units || '',
    dscr: l.dscr,
    occupancy: l.occupancy,
    balance: l.balance || 0,
    maturity: l.maturity || '',
    lender: l.lender || '',
    servicer: l.servicer || '',
    executiveSummary: l.executiveSummary || l.executive_summary || '',
    acquisitionAngle: l.acquisitionAngle || '',
    distressSignals: l.distressSignals || l.distress_signals || l.signals || '',
    priorityTier: l.priorityTier || l.priority_tier || l.tier || 'PASS (no data)',
    adjustedScore: l.adjustedScore || l.adjusted_score || l.score || 0,
    baseDistressScore: l.baseDistressScore || null,
    scoreAdjustment: l.scoreAdjustment || 0,
    dataQualityFlag: l.dataQualityFlag || '',
    status: l.status || 'New',
    lastUpdated: l.lastUpdated || '',
    _rowIndex: l._rowIndex || ''
  };
}

const STATE_NAMES = {FL:'Florida',GA:'Georgia',TN:'Tennessee',NC:'North Carolina',SC:'South Carolina',AL:'Alabama'};
const TIER_ORDER = ['HOT','WARM','WATCH','WATCH*','REVIEW','PASS','PASS (no data)'];
const TIER_COLORS = {'HOT':'#ff4444','WARM':'#ff8800','WATCH':'#ADFF2F','WATCH*':'#88cc00','REVIEW':'#ffcc00','PASS':'#2A2A2A','PASS (no data)':'#1A1A1A'};

let filterState = '';
let filterCity = '';
let filterSource = '';
let filterSearch = '';
let filterTier = '';
let sortCol = 'adjustedScore';
let sortDir = -1;

// ── INIT ──
function init() {
  buildStats();
  buildStateGrid();
  buildFilters();
  buildTierPills();
  renderTable();
  bindEvents();
}

// PASS tier is hidden globally — too much noise
function isActionable(l) {
  return l.priorityTier && !l.priorityTier.startsWith('PASS');
}

function filtered() {
  return LEADS.filter(l => {
    if (!isActionable(l)) return false;
    if (filterState && l.state !== filterState) return false;
    if (filterCity && l.city !== filterCity) return false;
    if (filterSource && l.source !== filterSource) return false;
    if (filterTier) {
      if (filterTier === 'WATCH') {
        if (!['WATCH','WATCH*'].includes(l.priorityTier)) return false;
      } else if (l.priorityTier !== filterTier) {
        return false;
      }
    }
    if (filterSearch && !(l.name || '').toLowerCase().includes(filterSearch.toLowerCase())) return false;
    return true;
  });
}

// ── STATS ──
function buildStats() {
  const ACTIVE = LEADS.filter(isActionable);
  const total = ACTIVE.length;
  const hot = ACTIVE.filter(l => l.priorityTier === 'HOT').length;
  const warm = ACTIVE.filter(l => l.priorityTier === 'WARM').length;
  const watch = ACTIVE.filter(l => ['WATCH','WATCH*'].includes(l.priorityTier)).length;
  const totalBal = ACTIVE.reduce((s,l) => s + (l.balance || 0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="label">Actionable Leads</div><div class="value">${total}</div></div>
    <div class="stat-card hot"><div class="label">Hot</div><div class="value accent" style="color:#ff4444">${hot}</div></div>
    <div class="stat-card warm"><div class="label">Warm</div><div class="value" style="color:#ff8800">${warm}</div></div>
    <div class="stat-card watch"><div class="label">Watch</div><div class="value accent">${watch}</div></div>
    <div class="stat-card"><div class="label">Total Balance</div><div class="value" style="font-size:24px">$${(totalBal/1e6).toFixed(0)}M</div></div>
    <div class="stat-card"><div class="label">States</div><div class="value">${new Set(ACTIVE.map(l=>l.state).filter(Boolean)).size}</div></div>
    <div class="stat-card"><div class="label">Cities</div><div class="value">${new Set(ACTIVE.map(l=>l.city).filter(Boolean)).size}</div></div>
  `;
}

// ── STATE GRID ──
function buildStateGrid() {
  const states = {};
  LEADS.filter(isActionable).forEach(l => {
    if (!states[l.state]) states[l.state] = {total:0, tiers:{}};
    states[l.state].total++;
    states[l.state].tiers[l.priorityTier] = (states[l.state].tiers[l.priorityTier]||0) + 1;
  });

  const grid = document.getElementById('stateGrid');
  grid.innerHTML = Object.entries(states)
    .sort((a,b) => b[1].total - a[1].total)
    .map(([st, info]) => {
      const hotW = (info.tiers['HOT']||0) / info.total * 100;
      const warmW = (info.tiers['WARM']||0) / info.total * 100;
      const watchW = ((info.tiers['WATCH']||0) + (info.tiers['WATCH*']||0)) / info.total * 100;
      const passW = 100 - hotW - warmW - watchW;
      const hotCount = info.tiers['HOT']||0;
      const warmCount = info.tiers['WARM']||0;
      const watchCount = (info.tiers['WATCH']||0) + (info.tiers['WATCH*']||0);
      return `<div class="state-card${filterState===st?' selected':''}" data-state="${st}">
        <div class="state-name">${STATE_NAMES[st]||st}</div>
        <div class="state-count">${info.total} leads${hotCount?` &middot; <strong>${hotCount} HOT</strong>`:''}${warmCount?` &middot; <strong style="color:#ff8800">${warmCount} WARM</strong>`:''}${watchCount?` &middot; <strong>${watchCount} WATCH</strong>`:''}</div>
        <div class="state-mini-bars">
          ${hotW?`<div style="width:${hotW}%;background:#ff4444"></div>`:''}
          ${warmW?`<div style="width:${warmW}%;background:#ff8800"></div>`:''}
          ${watchW?`<div style="width:${watchW}%;background:#ADFF2F"></div>`:''}
          <div style="width:${passW}%;background:#2A2A2A"></div>
        </div>
      </div>`;
    }).join('');
}

// ── FILTERS ──
function buildFilters() {
  const ACTIVE = LEADS.filter(isActionable);
  const states = [...new Set(ACTIVE.map(l=>l.state).filter(Boolean))].sort();
  const stSel = document.getElementById('filterState');
  stSel.innerHTML = '<option value="">All States</option>' + states.map(s=>`<option value="${s}">${STATE_NAMES[s]||s}</option>`).join('');

  const sources = [...new Set(ACTIVE.map(l => l.source).filter(Boolean))].sort();
  const srcSel = document.getElementById('filterSource');
  srcSel.innerHTML = '<option value="">All Sources</option>' + sources.map(s=>`<option value="${s}">${s}</option>`).join('');

  updateCityFilter();
}

function updateCityFilter() {
  const base = LEADS.filter(isActionable);
  const pool = filterState ? base.filter(l=>l.state===filterState) : base;
  const cities = [...new Set(pool.map(l=>l.city).filter(Boolean))].sort();
  const cSel = document.getElementById('filterCity');
  cSel.innerHTML = '<option value="">All Cities</option>' + cities.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function buildTierPills() {
  const tiers = ['','HOT','WARM','WATCH'];
  const labels = ['All','HOT','WARM','WATCH'];
  document.getElementById('tierPills').innerHTML = tiers.map((t,i) => {
    const cls = filterTier===t ? (t==='HOT'?'active-hot':t==='WARM'?'active-warm':t==='WATCH'?'active-watch':'active') : '';
    return `<div class="tier-pill ${cls}" data-tier="${t}">${labels[i]}</div>`;
  }).join('');
}

// ── TABLE ──
function renderTable() {
  const data = filtered().sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'priorityTier') { va = TIER_ORDER.indexOf(va); vb = TIER_ORDER.indexOf(vb); }
    if (['units','balance','adjustedScore'].includes(sortCol)) { va = Number(va)||0; vb = Number(vb)||0; }
    if (['dscr','occupancy'].includes(sortCol)) { va = va===null?-1:Number(va); vb = vb===null?-1:Number(vb); }
    if (['lender','servicer','source','name','city','state','maturity'].includes(sortCol)) { va = (va||'').toString().toLowerCase(); vb = (vb||'').toString().toLowerCase(); }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });

  document.getElementById('tableBody').innerHTML = data.map(l => {
    const tierLabel = l.priorityTier || 'PASS';
    const tierClass = tierLabel.startsWith('PASS') ? 'PASS' : tierLabel.replace(/[^A-Z]/g,'');
    const score = l.adjustedScore || 0;
    const scoreColor = score >= 85 ? '#ff4444' : score >= 60 ? '#ff8800' : score >= 30 ? '#ADFF2F' : '#2A2A2A';
    const scorePct = Math.min(score, 100);
    const signals = (l.distressSignals||'').split(/\s*\|\s*|\s*;\s*/).filter(Boolean).map(s => {
      const test = s.toLowerCase();
      const isDist = test.includes('special servicer') || test.includes('workout') || test.includes('delinquent') || test.includes('foreclosure') || test.includes('dscr <') || test.includes('occupancy 0') || test.includes('matured');
      return `<span class="signal-tag${isDist?' distress':''}">${s}</span>`;
    }).join('');
    const dscrDisplay = l.dscr !== null && l.dscr !== '' ? Number(l.dscr).toFixed(2) : '<span style="color:#555">—</span>';
    const occDisplay = l.occupancy !== null && l.occupancy !== '' ? Number(l.occupancy).toFixed(1) + '%' : '<span style="color:#555">—</span>';
    const balDisplay = l.balance ? '$' + (l.balance >= 1e6 ? (l.balance/1e6).toFixed(1)+'M' : (l.balance/1e3).toFixed(0)+'K') : '—';

    const sheetId = '1pKXelpQSWMOA9TneczajTSaDP1NqwwF14KtMmVudsTU';
    const rowNum = l._rowIndex || '';
    const sheetLink = rowNum ? `https://docs.google.com/spreadsheets/d/${sheetId}/edit#gid=0&range=A${rowNum}` : '';
    const propCell = sheetLink
      ? `<a class="prop-link" href="${sheetLink}" target="_blank" title="Open in Google Sheet → Row ${rowNum}">${l.name}</a>`
      : l.name;

    const execRaw = (l.executiveSummary || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    const execCell = execRaw
      ? `<div class="exec-summary" onclick="this.classList.toggle('expanded')"><div class="exec-summary-short">${execRaw}</div><span class="exec-toggle">more ▾</span></div>`
      : '<span style="color:#555">—</span>';

    return `<tr>
      <td style="font-weight:700">${propCell}</td>
      <td>${l.city || '—'}</td>
      <td>${l.state || '—'}</td>
      <td>${l.source || '—'}</td>
      <td>${l.units||'—'}</td>
      <td><div class="score-bar"><div class="score-bar-fill" style="width:${scorePct}%;background:${scoreColor}"></div></div>${score}</td>
      <td><span class="tier-badge tier-${tierClass}">${tierLabel}</span></td>
      <td>${dscrDisplay}</td>
      <td>${occDisplay}</td>
      <td>${balDisplay}</td>
      <td>${l.maturity||'—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${l.lender||''}">${l.lender||'—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${l.servicer||''}">${l.servicer||'—'}</td>
      <td>${signals || '<span style="color:#555">—</span>'}</td>
      <td>${execCell}</td>
    </tr>`;
  }).join('');

  document.querySelectorAll('thead th').forEach(th => {
    const col = th.dataset.sort;
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = col === sortCol ? (sortDir === 1 ? '▲' : '▼') : '';
  });
}

// ── EVENTS ──
function bindEvents() {
  document.getElementById('filterState').addEventListener('change', e => {
    filterState = e.target.value;
    filterCity = '';
    updateCityFilter();
    buildStateGrid();
    renderTable();
  });
  document.getElementById('filterCity').addEventListener('change', e => {
    filterCity = e.target.value;
    renderTable();
  });
  document.getElementById('filterSource').addEventListener('change', e => {
    filterSource = e.target.value;
    renderTable();
  });
  document.getElementById('filterSearch').addEventListener('input', e => {
    filterSearch = e.target.value;
    renderTable();
  });
  document.getElementById('tierPills').addEventListener('click', e => {
    const pill = e.target.closest('.tier-pill');
    if (!pill) return;
    filterTier = pill.dataset.tier;
    buildTierPills();
    renderTable();
  });
  document.getElementById('stateGrid').addEventListener('click', e => {
    const card = e.target.closest('.state-card');
    if (!card) return;
    const st = card.dataset.state;
    filterState = filterState === st ? '' : st;
    document.getElementById('filterState').value = filterState;
    filterCity = '';
    updateCityFilter();
    buildStateGrid();
    renderTable();
  });
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = ['adjustedScore','priorityTier'].includes(col) ? -1 : 1; }
      renderTable();
    });
  });
}

// ── LIVE FETCH OR FALLBACK ──
const statusEl = document.createElement('div');
statusEl.style.cssText = 'position:fixed;top:12px;right:12px;z-index:999;font-size:11px;font-family:Inter,sans-serif;padding:6px 14px;border-radius:8px;';
document.body.appendChild(statusEl);

function showStatus(msg, color) {
  statusEl.textContent = msg;
  statusEl.style.background = color;
  statusEl.style.color = color === '#1A3320' ? '#ADFF2F' : '#0D0D0D';
  setTimeout(() => { statusEl.style.opacity = '0.6'; }, 3000);
}

if (SHEET_CSV_URL.includes('PASTE_YOUR_PUBLISHED_ID_HERE')) {
  LEADS = FALLBACK_LEADS.map(normalizeFallbackLead);
  showStatus('OFFLINE MODE — using snapshot data', '#2A2A2A');
  statusEl.style.color = '#888';
  init();
} else {
  showStatus('Fetching live data...', '#1A3320');
  fetch(SHEET_CSV_URL)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(csv => {
      const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });
      if (parsed.data && parsed.data.length > 0) {
        LEADS = parsed.data
          .map((row, i) => {
            const r = parseSheetRow(row);
            r._rowIndex = i + 2;
            return r;
          })
          .filter(r => r.name && r.name.trim());
        const actionableCount = LEADS.filter(isActionable).length;
        showStatus('LIVE — ' + actionableCount + ' actionable (' + LEADS.length + ' total) from Google Sheets', '#1A3320');
      } else {
        LEADS = FALLBACK_LEADS.map(normalizeFallbackLead);
        showStatus('Sheet empty — using snapshot', '#2A2A2A');
        statusEl.style.color = '#888';
      }
      init();
    })
    .catch(err => {
      console.warn('Live fetch failed, using fallback:', err);
      LEADS = FALLBACK_LEADS.map(normalizeFallbackLead);
      showStatus('Fetch failed — using snapshot data', '#3a1111');
      statusEl.style.color = '#ff6666';
      init();
    });
}
</script>
